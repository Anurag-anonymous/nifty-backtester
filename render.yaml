services:
  # ── Backtester App ────────────────────────────────────────────────────────
  - type: web
    name: nifty-backtester
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app_cloud:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
    autoDeploy: true

